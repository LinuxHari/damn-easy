syntax = "proto3";

package auth;

message LoginRequest {
    string email = 1;
    string password = 2;
    string fullName = 3;
    string username = 4;
}

message TokenResponse {
    string accessToken = 1;
    string refreshToken = 2;
    string csrfToken = 3;
}

service AuthService {
    rpc Login (LoginRequest) returns (TokenResponse) {}
}